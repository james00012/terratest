name: Build and Release

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }}/${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [linux, darwin, windows]
        arch: [amd64, arm64, "386"]
        exclude:
          - os: darwin
            arch: "386"
          - os: windows
            arch: arm64
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v3
        with:
          version: 2025.12.10
          experimental: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Go module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go modules
        run: go mod download

      - name: Build binaries
        run: |
          set -e
          mkdir -p cmd/bin
          EXT=""
          if [ "${{ matrix.os }}" = "windows" ]; then EXT=".exe"; fi
          OUT_DIR="$(pwd)/cmd/bin"
          for cmd_dir in cmd/*/; do
            cmd_name=$(basename "$cmd_dir")
            # Skip the output dir itself
            if [ "$cmd_name" = "bin" ]; then continue; fi
            echo "Building $cmd_name for ${{ matrix.os }}/${{ matrix.arch }}"
            if [ -f "$cmd_dir/go.mod" ]; then
              (cd "$cmd_dir" && \
                CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
                go build -o "$OUT_DIR/${cmd_name}_${{ matrix.os }}_${{ matrix.arch }}${EXT}" .)
            else
              CGO_ENABLED=0 GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} \
                go build -o "$OUT_DIR/${cmd_name}_${{ matrix.os }}_${{ matrix.arch }}${EXT}" \
                "./$cmd_dir"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: cmd/bin/
          retention-days: 7

  release:
    name: Release
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: cmd/bin/
          pattern: binaries-*
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: cd cmd/bin && sha256sum -- * > SHA256SUMS

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in cmd/bin/*; do
            gh release upload "${{ github.ref_name }}" "$f" --clobber
          done
